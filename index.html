<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Screens will be toggled via JS -->
        
        <!-- Screen 1: Welcome -->
        <div id="screen-welcome" class="screen active">
            <h1 class="title-bounce">HAPPY BIRTHDAY</h1>
            <p class="subtitle">แด่น้องชิ เจ้าหญิงตัวน้อย!</p>
            <div class="pixel-avatar bouncing"></div>
            <p class="blink-text" id="start-btn">แตะหนึ่งครั้งเพื่อเริ่ม</p>
        </div>

        <!-- Screen 2: Balloon Pop Game -->
        <div id="screen-balloons" class="screen">
            <h2 class="pixel-title">Pop the Balloons!</h2>
            <div id="balloon-area"></div>
            <p id="balloon-counter" class="subtitle">Balloons Popped: 0 / 5</p>
        </div>

        <!-- Screen 3: The Cake -->
        <div id="screen-cake" class="screen">
            <h2 class="pixel-title">Make a Wish!</h2>
            <div class="cake-container">
                <div class="cake">
                    <div class="candle" id="candle1">
                        <div class="flame active"></div>
                        <div class="stick"></div>
                    </div>
                    <div class="candle" id="candle2">
                        <div class="flame active"></div>
                        <div class="stick"></div>
                    </div>
                    <div class="candle" id="candle3">
                        <div class="flame active"></div>
                        <div class="stick"></div>
                    </div>
                    <div class="frosting"></div>
                    <div class="cake-body"></div>
                </div>
            </div>
            <h3 class="hint">กดเทียนเพื่อเป่า</h3>
        </div>

        <!-- RPG Dialogue Box (Overlay) -->
        <div id="rpg-dialogue" class="hidden">
            <div class="dialogue-box">
                <div class="dialogue-avatar"></div>
                <div class="dialogue-content">
                    <div class="dialogue-name">???</div>
                    <div class="dialogue-text" id="dialogue-text"></div>
                    <div class="dialogue-hint" style="font-size: 10px; color: #888; margin-top: 10px; font-family: 'Prompt', sans-serif;">(แตะที่ข้อความเพื่ออ่านต่อ)</div>
                    <div class="dialogue-arrow blink-text">▼</div>
                </div>
            </div>
        </div>

        <!-- Jumpscare -->
        <div id="jumpscare" class="hidden">
            <img src="jumpscare.jpg" alt="Jumpscare">
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
